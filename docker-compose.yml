version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - KAPRUKA_MCP_URL=${KAPRUKA_MCP_URL:-http://host.docker.internal:3200/mcp}
    networks:
      - kapruka-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - kapruka-network

networks:
  kapruka-network:
    driver: bridge
